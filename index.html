<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0E1621" />
<title>Freeze Faker — Don't Act Human.</title>
<meta name="description" content="Blend into an NPC crowd. Freeze when the Red Light hits. But don't just stop — stop like an NPC." />
<link rel="icon" href="assets/favicon.svg" />
<link rel="stylesheet" href="styles.css" />

<div id="app">
  <!-- The canvas is the game world; DOM layers sit on top for crisp UI/text. -->
  <canvas id="stage" aria-label="Freeze Faker game screen"></canvas>
  <canvas id="overlay" aria-hidden="true"></canvas>

  <!-- Screen layers are shown/hidden by the game state machine. -->
  <div id="screens"></div>

  <!-- Live region for accessibility announcements (light state, results). -->
  <div id="live" class="sr-only" aria-live="polite"></div>
</div>

<noscript>
  <p style="color:#F2F1EC;background:#0E1621;padding:24px;font-family:sans-serif">
    Freeze Faker needs JavaScript enabled to run.
  </p>
</noscript>

<script type="module" src="src/main.js"></script>
